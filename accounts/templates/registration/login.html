<!DOCTYPE html>
<html>

<head>
    <title>Login - My Garden</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.21.5/dist/css/uikit.min.css" />
</head>

<body class="uk-background-muted uk-flex uk-flex-center uk-flex-middle" uk-height-viewport>

    <div class="uk-card uk-card-default uk-card-body uk-width-large uk-box-shadow-large">
        <h3 class="uk-card-title uk-text-center">ログイン</h3>

        <form method="post">
            {% csrf_token %}
            <div class="uk-margin">
                <div class="uk-inline uk-width-1-1">
                    <span class="uk-form-icon" uk-icon="icon: user"></span>
                    {{ form.username }}
                </div>
            </div>

            <div class="uk-margin">
                <div class="uk-inline uk-width-1-1">
                    <span class="uk-form-icon" uk-icon="icon: lock"></span>
                    {{ form.password }}
                </div>
            </div>

            <div class="uk-margin">
                <button class="uk-button uk-button-primary uk-width-1-1" type="submit">ログイン</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/uikit@3.21.5/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.21.5/dist/js/uikit-icons.min.js"></script>
</body>

</html>
