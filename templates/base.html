<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}畑管理{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f0; color: #333; }
    header {
      background: #4a7c59;
      color: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header a { color: white; text-decoration: none; font-size: 1.1rem; font-weight: bold; }
    header nav a { font-size: 0.9rem; margin-left: 16px; }
    main { padding: 20px; max-width: 900px; margin: 0 auto; }
    .btn {
      display: inline-block;
      padding: 8px 16px;
      background: #4a7c59;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .btn:hover { background: #3a6347; }
    .btn-secondary { background: #888; }
    .btn-secondary:hover { background: #666; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <header>
    <a href="{% url 'garden:mypage' %}">畑管理</a>
    <nav>
      {% if user.is_authenticated %}
        <span>{{ user.username }}</span>
        <a href="{% url 'logout' %}">ログアウト</a>
      {% else %}
        <a href="{% url 'login' %}">ログイン</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block extra_js %}{% endblock %}
</body>
</html>
