<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>菜園手帖</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#e8e0ce;font-family:'Zen Kaku Gothic New',sans-serif;color:#2c2a22;overflow:hidden;}

/* ─── App shell ─── */
.app{
  position:fixed;top:0;left:0;right:0;
  max-width:430px;margin:0 auto;height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;
  background:#f6f2e8;
  box-shadow:0 0 40px rgba(0,0,0,.15);
  transform:translateZ(0);
}

/* ─── Header ─── */
.app-header{
  padding:14px 18px 6px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
@supports(padding-top:env(safe-area-inset-top)){
  .app-header{padding-top:calc(14px + env(safe-area-inset-top))}
}
.app-logo{display:flex;align-items:center;gap:8px}
.app-logo-icon{
  width:26px;height:26px;border-radius:50%;background:#5d8a55;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.app-logo-leaf{width:9px;height:13px;background:#f6f2e8;border-radius:0 9px 0 9px;transform:rotate(-20deg)}
.app-logo-name{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:600;color:#2c2a22}
.app-date-block{text-align:right;line-height:1.15}
.app-date-label{font-size:9px;color:#a79e88;letter-spacing:.06em;font-weight:600}
.app-date-val{font-size:12px;color:#6b6655;font-weight:700}
.app-user-row{display:flex;align-items:center;justify-content:flex-end;gap:7px;margin-bottom:4px}
.app-user-name{font-size:10px;color:#6b6655;font-weight:700}
.btn-logout{
  background:none;border:none;padding:0;
  font-size:10px;color:#a79e88;font-weight:600;
  cursor:pointer;font-family:inherit;text-decoration:underline;
}

/* ─── Year scrubber ─── */
.scrub-wrap{padding:4px 16px 6px;flex-shrink:0}
.scrub-caption{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:6px;
}
.scrub-caption-text{font-size:10px;color:#8a8067;font-weight:700;letter-spacing:.04em}
.scrub-caption-sub{font-size:10px;color:#a79e88;font-weight:600}
.year-chips{display:flex;gap:7px}

/* ─── Date chips (garden tab only) ─── */
.date-chips-wrap{
  padding:0 16px 8px;flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.date-chips-label{font-size:10px;color:#a79e88;font-weight:600;white-space:nowrap;flex-shrink:0}
.date-chips{
  display:flex;gap:6px;overflow-x:auto;
  scrollbar-width:none;padding-bottom:2px;
}
.date-chips::-webkit-scrollbar{display:none}
.date-chip{
  flex-shrink:0;padding:4px 10px 3px;border-radius:20px;
  border:1px solid #e6dfcd;background:#efe9da;
  font-size:11px;font-weight:700;color:#7a7060;cursor:pointer;
  white-space:nowrap;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.date-chip.active{background:var(--accent);color:#fff;border-color:transparent}
.date-chip.active .chip-tags{opacity:.75}
.date-chip.is-today{border-color:#a79e88}
.chip-tags{display:flex;gap:2px}
.chip-tag{
  font-size:8px;font-weight:700;line-height:1.4;
  padding:0 3px;border-radius:3px;
}
.chip-tag.bed     {background:#e4d8c8;color:#7a5530}
.chip-tag.planted {background:#d5eacd;color:#34682c}
.chip-tag.harvested{background:#f0e2c0;color:#8a5e20}
.year-chip{
  flex:1;padding:7px 4px 6px;border-radius:13px;border:1px solid #e6dfcd;
  background:#efe9da;cursor:pointer;text-align:center;
  transition:background .15s,border-color .15s;
}
.year-chip.active{background:var(--accent);border-color:transparent}
.year-chip.active-past{background:#94865f;border-color:transparent}
.year-chip-year{
  font-family:'Shippori Mincho',serif;font-size:16px;font-weight:600;
  color:#5a5446;line-height:1.1;display:block;
}
.year-chip.active .year-chip-year,
.year-chip.active-past .year-chip-year{color:#fff}
.year-chip-tag{font-size:9px;color:#a79e88;font-weight:700;display:block;margin-top:1px}
.year-chip.active .year-chip-tag,
.year-chip.active-past .year-chip-tag{color:rgba(255,255,255,.8)}

/* ─── Scrollable body ─── */
.tab-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:4px 16px 18px;
  scrollbar-width:none;
}
.tab-body::-webkit-scrollbar{display:none}

/* ─── Bottom tab bar ─── */
.bottom-tabs{
  display:flex;border-top:1px solid #e6dfcd;background:#f6f2e8;
  padding:8px 0 env(safe-area-inset-bottom,8px);flex-shrink:0;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;background:none;border:none;cursor:pointer;
  color:#a79e88;padding:4px 0;transition:color .15s;
}
.tab-btn.active{color:var(--accent)}
.tab-btn-label{font-size:10px;font-weight:700}

/* ─── CSS vars ─── */
:root{--accent:#5d8a55}

/* ─── Area selector ─── */
.area-tabs{display:flex;gap:6px;margin-bottom:10px}
.area-tab{
  padding:5px 14px;border:1px solid #e6dfcd;border-radius:20px;
  background:#fff;font-size:12px;font-weight:700;color:#8a8067;
  cursor:pointer;transition:all .15s;
}
.area-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ─── Garden map ─── */
.map-section{display:flex;flex-direction:column;gap:8px}
.map-title-row{display:flex;align-items:baseline;justify-content:space-between;padding:0 2px}
.map-title{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:600;color:#33302a}
.map-sub{font-size:10px;color:#a79e88;font-weight:600}

.garden-map{
  position:relative;width:100%;
  background:linear-gradient(to bottom,#d6cbb3,#cdc2a9);
  border-radius:12px;border:1px solid #c2b596;
  overflow:hidden;
  box-shadow:inset 0 1px 4px rgba(90,72,40,.12);
}
/* aspect-ratio set inline based on area.rows/cols */

.bed-btn{
  position:absolute;border-radius:5px;cursor:pointer;
  overflow:hidden;display:flex;align-items:center;
  justify-content:center;padding:4%;
  border:1px solid #a98f63;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.14),0 1px 2px rgba(60,45,20,.18);
  transition:filter .1s;
}
.bed-btn:hover{filter:brightness(.9)}
.bed-btn.empty{
  background:#c8ba9c;border:1.5px dashed #ad9f80;
  align-items:center;justify-content:center;
}
.bed-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(250,246,236,.93);border-radius:7px;padding:2px 6px;
  max-width:100%;overflow:hidden;
}
.bed-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.bed-name{font-size:10.5px;font-weight:700;color:#3a352b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.bed-empty-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(250,246,236,.7);border-radius:7px;padding:2px 7px;
}
.bed-empty-dot{width:7px;height:7px;border-radius:50%;background:#a89e84;flex-shrink:0}
.bed-empty-name{font-size:10px;font-weight:700;color:#857c66}
.warn-dot{
  position:absolute;top:4px;right:4px;width:9px;height:9px;
  border-radius:50%;box-shadow:0 0 0 2px rgba(255,255,255,.55);
}

/* ─── Legend ─── */
.legend-wrap{display:flex;flex-wrap:wrap;gap:9px 14px;justify-content:center;padding:4px 4px 2px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:9px;height:9px;border-radius:2px;display:inline-block}
.legend-name{font-size:10px;color:#8a8067;font-weight:600}
.map-hint{text-align:center;font-size:10px;color:#b3aa92;margin-top:2px}
.btn-add-bed{
  background:none;border:1px solid var(--accent);color:var(--accent);
  border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;
}
.btn-add-bed:hover{background:var(--accent);color:#fff}
.add-bed-pos-grid{display:flex;flex-direction:column;gap:8px}
.add-bed-pos-hint{font-size:10px;color:#a79e88;font-weight:600;margin-bottom:2px}
.add-bed-tmpl-year-chips{display:flex;flex-wrap:wrap;gap:6px}
.add-bed-tmpl-year-chip{
  padding:4px 11px;border-radius:20px;border:1.5px solid #e6dfcd;background:#fbf8f0;
  font-size:11px;font-weight:700;color:#6b6655;cursor:pointer;font-family:inherit;transition:all .15s;
}
.add-bed-tmpl-year-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.add-bed-tmpl-map-wrap{
  margin-top:6px;border-radius:10px;overflow:hidden;
  border:1px solid #ddd7c5;background:#cdc2a9;
}
.add-bed-tmpl-hint{
  font-size:10px;color:#a79e88;font-weight:600;text-align:center;
  padding:4px 0 0;
}
.add-bed-tmpl-info{
  font-size:11px;color:var(--accent);font-weight:700;
  padding:5px 2px 0;display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;
}
.add-bed-tmpl-info-sub{font-size:10px;color:#6b6655;font-weight:600}

/* ─── Banner ─── */
.banner{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:#f1e7d2;border:1px solid #e4d6b6;border-radius:13px;
  padding:9px 10px 9px 13px;
}
.banner-text{font-size:12px;font-weight:700;color:#7a5c2e}
.btn-now{
  background:var(--accent);color:#fff;border:none;border-radius:9px;
  padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;
}

/* ─── Compare tab ─── */
.compare-head{display:flex;gap:8px;padding:2px 4px 6px}
.compare-col-head{flex:1;text-align:center}
.compare-col-label{font-size:11px;font-weight:700;color:var(--accent)}
.compare-col-sub{font-size:10px;color:#a79e88;font-weight:600}
.compare-col-label.past{color:#94865f}

.compare-row{
  background:#fbf8f0;border:1px solid #ece5d3;border-radius:14px;
  padding:10px 11px 11px;margin-bottom:8px;
}
.compare-row-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;
}
.compare-row-label{font-size:11px;font-weight:700;color:#8a8067}
.compare-flag{
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;
}
.compare-cols{display:flex;gap:8px}
.compare-cell{
  flex:1;display:flex;flex-direction:column;gap:2px;align-items:center;
  justify-content:center;padding:11px 6px;border-radius:11px;min-height:54px;
}
.compare-cell-name{font-family:'Shippori Mincho',serif;font-size:14px;font-weight:700}
.compare-cell-name.empty{color:#9b9277;font-size:13px}
.compare-cell-sub{font-size:9.5px;color:#8a8067;font-weight:600}
.compare-hint{text-align:center;font-size:10px;color:#b3aa92;margin-top:4px}

/* ─── Timeline tab ─── */
.tl-card{
  background:#fbf8f0;border:1px solid #ece5d3;border-radius:16px;
  padding:12px 11px 13px;margin-bottom:12px;
}
.tl-head{display:grid;gap:6px;margin-bottom:7px}
.tl-head-cell{
  text-align:center;font-size:11px;font-weight:700;
  padding:4px 0;border-radius:8px;color:#8a8067;
}
.tl-head-cell.active{background:var(--accent);color:#fff}
.tl-row-grid{display:grid;gap:6px;align-items:stretch;margin-bottom:6px}
.tl-row-label{
  display:flex;align-items:center;
  font-size:9.5px;font-weight:700;color:#8a8067;
}
.tl-cell{
  padding:9px 3px;border-radius:9px;font-family:'Shippori Mincho',serif;
  font-size:10.5px;font-weight:700;cursor:pointer;min-height:42px;
  line-height:1.1;text-align:center;border:none;
  display:flex;align-items:center;justify-content:center;
  transition:filter .1s;
}
.tl-cell:hover{filter:brightness(.93)}
.tl-cell.empty{
  background:#f1ecdd;color:#b3aa92;font-size:12px;
  border:1.5px dashed #cfc8b4;
}
.tl-cell.active-border{border-width:2px !important;border-style:solid !important}
.tl-legend{display:flex;gap:11px;justify-content:center;flex-wrap:wrap;padding:2px 0}

/* ─── Detail sheet (bottom drawer) ─── */
.overlay{
  position:absolute;inset:0;background:rgba(30,27,18,.44);z-index:30;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.show{opacity:1;pointer-events:auto}

.detail-sheet{
  position:absolute;left:0;right:0;bottom:0;z-index:31;
  max-height:84%;background:#f6f2e8;border-radius:26px 26px 0 0;
  box-shadow:none;visibility:hidden;
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1),visibility 0s .28s;
}
.detail-sheet.show{
  transform:translateY(0);visibility:visible;
  box-shadow:0 -14px 44px rgba(30,27,18,.3);
  transition:transform .28s cubic-bezier(.32,.72,0,1),visibility 0s 0s;
}
.detail-handle{padding:11px 0 5px;display:flex;justify-content:center;flex-shrink:0}
.detail-handle-bar{width:40px;height:4px;border-radius:2px;background:#d8d0bd}
.detail-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 19px 32px;scrollbar-width:none}
.detail-scroll::-webkit-scrollbar{display:none}

.detail-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.detail-meta{font-size:10px;color:#a79e88;font-weight:700;letter-spacing:.03em;margin-bottom:3px}
.detail-crop-name{font-family:'Shippori Mincho',serif;font-size:25px;font-weight:600;color:#2c2a22}
.detail-tags{display:flex;gap:9px;align-items:center;margin-top:6px}
.detail-fam-tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
.detail-variety{font-size:11px;color:#8a8067;font-weight:600}
.btn-close{
  flex-shrink:0;width:36px;height:36px;border-radius:50%;border:none;
  background:#ece5d3;color:#6b6655;font-size:14px;cursor:pointer;
  touch-action:manipulation;position:relative;z-index:1;
}

.detail-body{display:flex;flex-direction:column;gap:13px;margin-top:15px}

.detail-dates{
  background:#fbf8f0;border:1px solid #ece5d3;border-radius:14px;padding:12px 13px;
  font-size:11.5px;color:#6b6655;font-weight:600;
}
.progress-wrap{margin-top:10px}
.progress-bar-bg{height:7px;border-radius:4px;background:#ece5d3;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;background:var(--accent);transition:width .3s}
.progress-label{font-size:11px;color:var(--accent);font-weight:700;margin-top:6px}

.rot-block{border-radius:14px;padding:12px 13px}
.rot-head{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.rot-dot-lg{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rot-title{font-size:12px;font-weight:700;color:#33302a}
.rot-sub{font-size:10px;color:#8a8067;font-weight:600;margin-left:auto;white-space:nowrap}
.rot-msg{font-size:12px;color:#5a5446;line-height:1.55}
.rot-conflict-list{display:flex;flex-direction:column;gap:5px}
.rot-conflict-row{display:grid;grid-template-columns:3.2em 1fr auto;align-items:center;gap:6px}
.rot-conflict-year{font-size:10px;color:#8a8067;font-weight:700;white-space:nowrap}
.rot-conflict-name{font-size:11px;font-weight:700;color:#33302a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rot-conflict-right{display:flex;align-items:center;gap:5px}
.rot-conflict-bar-wrap{width:52px;height:5px;border-radius:3px;background:rgba(0,0,0,0.1);overflow:hidden;flex-shrink:0}
.rot-conflict-bar{height:100%;border-radius:3px}
.rot-conflict-pct{font-size:10px;font-weight:700;color:#8a8067;white-space:nowrap;min-width:2.8em;text-align:right}

.section-title{font-size:11px;font-weight:700;color:#8a8067;margin-bottom:7px}
.history-cells{display:flex;gap:7px}
.history-cell{
  flex:1;text-align:center;padding:9px 4px;border-radius:11px;
}
.history-year{font-size:10px;color:#a79e88;margin-bottom:4px;font-weight:600}
.history-name{font-family:'Shippori Mincho',serif;font-size:12.5px;font-weight:700}

.log-list{display:flex;flex-direction:column}
.log-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #ece5d3}
.log-when{font-size:11px;color:#a79e88;width:50px;flex-shrink:0;font-weight:600}
.log-user{font-size:10px;color:#b3aa92;font-weight:600;white-space:nowrap;flex-shrink:0;align-self:center}
.log-task{font-size:11px;color:#6b6655;font-weight:700;white-space:nowrap}
.log-note{font-size:12px;color:#4a4639;flex:1}

.detail-empty-msg{
  background:#fbf8f0;border:1px solid #ece5d3;border-radius:14px;
  padding:13px 14px;font-size:12px;color:#5a5446;line-height:1.6;
}
.detail-rec-block{border-radius:14px;padding:12px 13px;border:1px solid rgba(93,138,85,.4);background:#e3ecdc}
.detail-rec-title{font-size:12px;font-weight:700;color:#33302a;margin-bottom:5px}
.detail-rec-msg{font-size:12px;color:#4a4639;line-height:1.55}

.btn-primary{
  width:100%;padding:13px;border-radius:12px;border:none;
  background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;
  font-family:inherit;
}
.btn-secondary{
  flex:1;padding:12px;border-radius:12px;border:1px solid #ddd4bf;
  background:#fbf8f0;color:#6b6655;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;
}
.btn-row{display:flex;gap:9px;margin-top:2px}

.crop-divider{height:1px;background:#e6dfcd;margin:4px 0}
.crop-section-head{margin-bottom:6px}
.crop-section-name{
  font-family:'Shippori Mincho',serif;font-size:15px;font-weight:700;margin-bottom:4px;
}
.detail-mix-label{font-size:11px;color:#a79e88;font-weight:600;margin-top:2px}

/* ── 記録フォーム ─────────────────────────────────── */
.log-form{display:flex;flex-direction:column;gap:16px}
.log-form-back{
  display:flex;align-items:center;gap:6px;background:none;border:none;
  color:#8a8067;font-size:13px;font-weight:700;cursor:pointer;padding:0;font-family:inherit;
}
.log-form-title{font-size:16px;font-weight:700;color:#33302a;margin-top:2px}
.form-label{font-size:11px;font-weight:700;color:#8a8067;margin-bottom:6px}
.task-chips{display:flex;flex-wrap:wrap;gap:7px}
.task-chip{
  padding:7px 13px;border-radius:20px;border:1.5px solid #e6dfcd;
  background:#fbf8f0;font-size:12px;font-weight:700;color:#7a7060;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.task-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.crop-select-chips{display:flex;flex-wrap:wrap;gap:7px}
.crop-sel-chip{
  padding:6px 12px;border-radius:20px;border:1.5px solid #e6dfcd;
  background:#fbf8f0;font-size:12px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .15s;
}
.crop-sel-chip.selected{color:#fff;border-color:transparent}
.log-date-input{
  width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #e6dfcd;
  background:#fbf8f0;font-size:13px;color:#33302a;font-family:inherit;
  box-sizing:border-box;
}
.log-note-input{
  width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #e6dfcd;
  background:#fbf8f0;font-size:13px;color:#33302a;font-family:inherit;
  resize:none;min-height:72px;box-sizing:border-box;
}
.log-date-input:focus,.log-note-input:focus{
  outline:none;border-color:var(--accent);
}
.log-submit{
  width:100%;padding:13px;border-radius:12px;border:none;
  background:var(--accent);color:#fff;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;
}
.log-submit:disabled{opacity:.5;cursor:not-allowed}
.log-success{
  text-align:center;padding:20px 0;font-size:14px;
  color:var(--accent);font-weight:700;
}

/* ── 収穫・撤去フォーム ──────────────────────────────── */
.harvest-row{display:flex;justify-content:flex-end;margin-top:6px}
.btn-harvest{
  background:none;border:1px solid #d4a090;border-radius:8px;
  color:#b3564a;font-size:11.5px;font-weight:700;padding:5px 11px;
  cursor:pointer;font-family:inherit;transition:opacity .1s;
}
.harvest-form{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:10px 12px;background:#fdf5f3;border-radius:10px;
  border:1px solid #e8c4ba;margin-top:8px;
}
.harvest-form-label{font-size:11px;font-weight:700;color:#b3564a;white-space:nowrap}
.harvest-date-input{
  flex:1;min-width:130px;padding:7px 10px;border-radius:8px;
  border:1.5px solid #e8c4ba;background:#fff;
  font-size:13px;font-family:inherit;color:#33302a;
}
.harvest-date-input:focus{outline:none;border-color:#b3564a}
.btn-harvest-confirm{
  padding:7px 14px;border-radius:8px;border:none;
  background:#b3564a;color:#fff;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap;
}
.btn-harvest-confirm:disabled{opacity:.5;cursor:not-allowed}
.btn-harvest-cancel{
  background:none;border:none;color:#a79e88;font-size:12px;
  cursor:pointer;font-family:inherit;padding:4px;white-space:nowrap;
}
.harvest-batch-row{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.harvest-batch-chk{width:15px;height:15px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.harvest-batch-label{font-size:12px;color:#6b6655;font-weight:600;cursor:pointer;line-height:1.4}

.bed-remove-row{
  margin-top:18px;padding-top:14px;border-top:1px solid #ece5d3;
  display:flex;flex-direction:column;gap:8px;
}
.btn-bed-remove{
  align-self:flex-start;
  background:none;border:1px solid #c9a080;color:#8a5e3a;
  border-radius:9px;padding:6px 14px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;
}

/* ── 植え付けフォーム ────────────────────────────────── */
.plant-bed-info{
  font-size:11px;font-weight:700;color:#8a8067;
  padding:8px 12px;background:#f0ebe0;border-radius:9px;margin-bottom:2px;
}
.plant-fam-wrap{margin-bottom:12px}
.plant-fam-label{font-size:10px;font-weight:700;letter-spacing:.05em;margin-bottom:5px;padding-left:2px}
.plant-vt-chips{display:flex;flex-wrap:wrap;gap:6px}
.plant-vt-chip{
  padding:5px 12px;border-radius:20px;border:1.5px solid #e6dfcd;background:#fbf8f0;
  font-size:12px;font-weight:700;color:#5a5446;cursor:pointer;font-family:inherit;transition:all .15s;
}
.plant-range-sec{display:flex;flex-direction:column;gap:14px;border-top:1px solid #ece5d3;padding-top:15px}
.plant-method-badge{
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;
}
.plant-range-row{display:flex;align-items:center;gap:8px}
.plant-range-label{font-size:11px;font-weight:700;color:#6b6655;white-space:nowrap;min-width:4.5em}
.plant-range-input{
  width:78px;padding:8px 10px;border-radius:8px;border:1.5px solid #e6dfcd;
  background:#fbf8f0;font-size:13px;font-family:inherit;color:#33302a;text-align:right;
}
.plant-range-input:focus{outline:none;border-color:var(--accent)}
.plant-range-unit{font-size:11px;color:#8a8067;font-weight:600;flex:1}
.plant-count-row{display:flex;align-items:center;gap:10px}
.plant-count-label{font-size:11px;font-weight:700;color:#6b6655;white-space:nowrap}
.plant-count-stepper{display:flex;align-items:center;gap:8px}
.plant-count-val{font-size:22px;font-weight:700;color:#33302a;min-width:2em;text-align:center}
.plant-count-btn{
  width:32px;height:32px;border-radius:50%;border:1.5px solid #e6dfcd;background:#fbf8f0;
  color:#5a5446;font-size:20px;line-height:1;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;transition:background .1s;
}
.plant-count-btn:hover{background:#e8e1d3}
.plant-spacing-info{font-size:10px;color:#a79e88;font-weight:600}
.plant-preview{
  display:flex;align-items:flex-end;padding:10px 12px 8px;
  background:#fbf8f0;border-radius:9px;border:1px solid #ece5d3;
  overflow-x:auto;min-height:48px;scrollbar-width:none;gap:0;
}
.plant-preview::-webkit-scrollbar{display:none}
.plant-prev-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;min-width:32px}
.plant-prev-dot{width:10px;height:10px;border-radius:50%}
.plant-prev-lbl{font-size:8px;color:#8a8067;font-weight:600;white-space:nowrap}
.plant-prev-line{flex:1;height:2px;background:#e6dfcd;align-self:center;min-width:8px}

/* ── 調整パネル ──────────────────────────────────────── */
.adj-panel{
  background:#f0ebe0;border:1px solid #ddd7c5;border-radius:12px;overflow:hidden;
}
.adj-pos-table{
  display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;
  padding:8px 12px 7px;border-bottom:1px solid #ddd7c5;
  background:#e8e1d3;
}
.adj-pos-kv{display:flex;align-items:baseline;gap:5px}
.adj-pos-k{font-size:9px;font-weight:700;color:#a79e88;white-space:nowrap;min-width:2em}
.adj-pos-v{font-size:14px;font-weight:700;color:#33302a}
.adj-toggle{
  width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:9px 13px;background:none;border:none;cursor:pointer;
  font-size:11px;font-weight:700;color:#6b6655;font-family:inherit;text-align:left;
}
.adj-toggle-arrow{font-size:9px;flex-shrink:0;transition:transform .2s;color:#a79e88}
.adj-toggle.open .adj-toggle-arrow{transform:rotate(180deg)}
.adj-body{display:flex;flex-direction:column;gap:10px;padding:0 12px 12px}
.adj-group-label{font-size:10px;font-weight:700;color:#8a8067;letter-spacing:.04em;margin-bottom:5px}
.adj-move-grid{
  display:grid;grid-template-columns:repeat(3,34px);grid-template-rows:repeat(3,34px);
  gap:4px;justify-content:start;
}
.adj-btn{
  width:34px;height:34px;border-radius:8px;border:1px solid #cfc8b4;
  background:#e8e1d3;color:#4a4639;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:inherit;transition:background .1s;
}
.adj-btn:hover{background:#ddd6c5}.adj-btn:active{background:#ccc5b0}
.adj-move-opt{display:flex;align-items:center;gap:6px;font-size:11px;color:#6b6655;font-weight:600;margin-top:5px}
.adj-move-opt input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;flex-shrink:0}
.adj-edge-grid{display:flex;flex-direction:column;gap:5px}
.adj-edge-row{display:flex;align-items:center;gap:7px}
.adj-edge-label{font-size:10px;font-weight:700;color:#8a8067;min-width:2.4em}
.adj-edge-btns{display:flex;gap:4px}
.adj-btn-sm{
  width:30px;height:26px;border-radius:7px;border:1px solid #cfc8b4;
  background:#e8e1d3;color:#4a4639;font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:inherit;transition:background .1s;
}
.adj-btn-sm:hover{background:#ddd6c5}.adj-btn-sm:active{background:#ccc5b0}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="app-header">
    <div class="app-logo">
      <div class="app-logo-icon"><div class="app-logo-leaf"></div></div>
      <span class="app-logo-name">菜園手帖</span>
    </div>
    <div class="app-date-block">
      <div class="app-user-row">
        <span class="app-user-name">{{ request.user.get_short_name|default:request.user.username }}</span>
        <form method="post" action="{% url 'logout' %}" style="display:contents">
          {% csrf_token %}
          <button type="submit" class="btn-logout">ログアウト</button>
        </form>
      </div>
      <div class="app-date-label">きょう</div>
      <div class="app-date-val" id="todayLabel"></div>
    </div>
  </header>

  <!-- Year scrubber -->
  <div class="scrub-wrap">
    <div class="scrub-caption">
      <span class="scrub-caption-text" id="scrubCaption">記録を見る年</span>
      <span class="scrub-caption-sub" id="scrubSub"></span>
    </div>
    <div class="year-chips" id="yearChips"></div>
  </div>

  <!-- Date chips (garden tab only) -->
  <div class="date-chips-wrap" id="dateChipsWrap" style="display:none">
    <span class="date-chips-label">日付</span>
    <div class="date-chips" id="dateChips"></div>
  </div>

  <!-- Main content -->
  <div class="tab-body" id="tabBody">
    <div class="area-tabs" id="areaTabs"></div>
    <div id="tabContent"></div>
  </div>

  <!-- Bottom tabs -->
  <nav class="bottom-tabs">
    <button class="tab-btn active" data-tab="garden" id="tabBtnGarden">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
        <rect x="3" y="3" width="8" height="18" rx="2"/>
        <rect x="13" y="3" width="8" height="8" rx="2"/>
        <rect x="13" y="13" width="8" height="8" rx="2"/>
      </svg>
      <span class="tab-btn-label">畑</span>
    </button>
    <button class="tab-btn" data-tab="compare" id="tabBtnCompare">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
        <rect x="3" y="4" width="7" height="16" rx="2"/>
        <rect x="14" y="4" width="7" height="16" rx="2"/>
      </svg>
      <span class="tab-btn-label">比較</span>
    </button>
    <button class="tab-btn" data-tab="timeline" id="tabBtnTimeline">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
        <line x1="4" y1="7" x2="20" y2="7"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="17" x2="20" y2="17"/>
        <circle cx="8" cy="7" r="1.6" fill="currentColor" stroke="none"/>
        <circle cx="15" cy="12" r="1.6" fill="currentColor" stroke="none"/>
        <circle cx="11" cy="17" r="1.6" fill="currentColor" stroke="none"/>
      </svg>
      <span class="tab-btn-label">年表</span>
    </button>
  </nav>

  <!-- Overlay + detail sheet -->
  <div class="overlay" id="overlay"></div>
  <div class="detail-sheet" id="detailSheet">
    <div class="detail-handle"><div class="detail-handle-bar"></div></div>
    <div class="detail-scroll" id="detailContent"></div>
  </div>

</div>

<script type="application/json" id="appData">
{"areas":[{% for a in areas %}{% if not forloop.first %},{% endif %}{"id":{{a.id}},"name":"{{a.name|escapejs}}","rows":{{a.rows}},"cols":{{a.cols}}}{% endfor %}],"today":"{{ today }}","currentYear":{{ current_year }},"csrf":"{{ csrf_token }}"}
</script>
<script>
const _d         = JSON.parse(document.getElementById('appData').textContent);
const AREAS      = _d.areas;
const TODAY      = _d.today;
const TODAY_YEAR = _d.currentYear;
const CSRF       = _d.csrf;
const API_STATE  = id  => `/garden2/api/area/${id}/state/`;
const API_DATES  = id  => `/garden2/api/area/${id}/dates/`;
const API_DETAIL = id  => `/garden2/api/bed/${id}/detail/`;
const API_LOG     = id  => `/garden2/api/bed/${id}/log/`;
const API_HARVEST    = id => `/garden2/api/crop/${id}/harvest/`;
const API_BED_REMOVE = id => `/garden2/api/bed/${id}/remove/`;
const API_BED_ADJUST  = id => `/garden2/api/bed/${id}/adjust/`;
const API_CROP_ADJUST = id => `/garden2/api/crop/${id}/adjust/`;
const API_VEG_TYPES   = ()  => `/garden2/api/vegetable-types/`;
const API_BED_PLANT   = id => `/garden2/api/bed/${id}/plant/`;
const API_BED_ADD     = id => `/garden2/api/area/${id}/bed/add/`;

// ── Adjust panel open state ────────────────────────────
let _adjOpen        = false;
let _cropAdjOpen    = {};
let _currentGarden  = null;  // renderGarden に渡された最新データ

// ── App state ──────────────────────────────────────────
let S = {
  tab:    'garden',
  year:   TODAY_YEAR,
  date:   TODAY,       // 畑タブ用の選択日付（YYYY-MM-DD）
  areaId: AREAS[0]?.id,
};

// ── Rotation level → colors ────────────────────────────
const ROT_COLOR = {
  high: {c:'#b3564a', bg:'#f2dfd9'},
  mid:  {c:'#c0883a', bg:'#f2e7cf'},
  low:  {c:'#9a8f5e', bg:'#ece7d2'},
  ok:   {c:'#5d8a55', bg:'#e3ecdc'},
  none: {c:'#a79e88', bg:'#f0ece0'},
};

// ── Init ───────────────────────────────────────────────
function init() {
  const todayD = new Date(TODAY + 'T00:00:00');
  document.getElementById('todayLabel').textContent =
    `${todayD.getFullYear()}.${todayD.getMonth()+1}.${todayD.getDate()}`;
  buildAreaTabs();
  document.querySelectorAll('.tab-btn').forEach(btn =>
    btn.addEventListener('click', () => switchTab(btn.dataset.tab))
  );
  document.getElementById('overlay').addEventListener('click', closeDetail);
  loadGardenTab();
}

// ── Area tabs ──────────────────────────────────────────
function buildAreaTabs() {
  const wrap = document.getElementById('areaTabs');
  wrap.innerHTML = '';
  if (AREAS.length <= 1) { wrap.style.display = 'none'; return; }
  AREAS.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'area-tab' + (a.id === S.areaId ? ' active' : '');
    btn.textContent = a.name;
    btn.addEventListener('click', () => {
      closeDetail();
      markNav();
      S.areaId = a.id;
      document.querySelectorAll('.area-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (S.tab === 'garden') loadGardenTab();
      else if (S.tab === 'compare') loadCompare();
      else loadTimeline();
    });
    wrap.appendChild(btn);
  });
}

// ── Year chips ─────────────────────────────────────────
function buildYearChips(years) {
  const wrap = document.getElementById('yearChips');
  wrap.innerHTML = '';
  const activeYear = S.tab === 'compare' ? compareYear() : S.year;
  years.forEach(y => {
    const isNow = y === TODAY_YEAR;
    const active = y === activeYear;
    const btn = document.createElement('button');
    btn.className = 'year-chip' + (active ? (isNow ? ' active' : ' active-past') : '');
    btn.innerHTML = `<span class="year-chip-year">${y}</span><span class="year-chip-tag">${isNow ? '今' : '記録'}</span>`;
    btn.addEventListener('click', () => selectYear(y));
    wrap.appendChild(btn);
  });
}

function updateScrubCaption() {
  const captions = {garden:'記録を見る年', compare:'比較する過去の年', timeline:'注目する年'};
  document.getElementById('scrubCaption').textContent = captions[S.tab] || '';
  const d = new Date(TODAY + 'T00:00:00');
  document.getElementById('scrubSub').textContent = `${d.getMonth()+1}月`;
}

function selectYear(y) {
  closeDetail();
  markNav();
  S.year = y;
  if (S.tab === 'compare') {
    loadCompare();
  } else if (S.tab === 'timeline') {
    loadTimeline();
  } else {
    loadGardenTab();
  }
}

function compareYear() {
  return S.year === TODAY_YEAR ? TODAY_YEAR - 1 : S.year;
}

// ── Date chips (畑タブ専用) ───────────────────────────
async function loadDates(year) {
  const res  = await fetch(`${API_DATES(S.areaId)}?year=${year}`);
  const data = await res.json();
  S.date = data.default;  // デフォルト日付をセット
  buildDateChips(data.dates, data.default);
  return data.default;
}

function buildDateChips(dates, selected) {
  const wrap = document.getElementById('dateChips');
  wrap.innerHTML = '';
  if (!dates.length) {
    document.getElementById('dateChipsWrap').style.display = 'none';
    return;
  }
  document.getElementById('dateChipsWrap').style.display = 'flex';

  dates.forEach(entry => {
    const dateStr  = entry.date;
    const types    = entry.types || [];
    const isToday  = dateStr === TODAY;
    const isActive = dateStr === selected;
    const btn = document.createElement('button');
    btn.className = 'date-chip' + (isActive ? ' active' : '') + (isToday ? ' is-today' : '');
    btn.dataset.date = dateStr;

    const main = document.createElement('span');
    main.textContent = isToday ? '今日' : fmtDateChip(dateStr);
    btn.appendChild(main);

    if (types.length) {
      const LABELS = {bed:'畝', planted:'植付', harvested:'収穫'};
      const tags = document.createElement('span');
      tags.className = 'chip-tags';
      types.forEach(t => {
        if (!LABELS[t]) return;
        const tag = document.createElement('span');
        tag.className = `chip-tag ${t}`;
        tag.textContent = LABELS[t];
        tags.appendChild(tag);
      });
      if (tags.children.length) btn.appendChild(tags);
    }

    btn.addEventListener('click', () => selectDate(dateStr));
    wrap.appendChild(btn);
  });

  // 選択チップが見えるようにスクロール（block:'nearest'で縦スクロールを抑止）
  const activeChip = wrap.querySelector('.date-chip.active');
  if (activeChip) activeChip.scrollIntoView({block:'nearest', inline:'nearest', behavior:'instant'});
}

function fmtDateChip(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function selectDate(dateStr) {
  S.date = dateStr;
  // チップのアクティブ更新
  document.querySelectorAll('.date-chip').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.date === dateStr);
  });
  // 畑マップを再描画
  loadGardenMap(dateStr);
}

// ── Tab switching ──────────────────────────────────────
function switchTab(tab) {
  closeDetail();
  markNav();
  S.tab = tab;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );
  updateScrubCaption();
  // 日付チップは畑タブのみ表示
  document.getElementById('dateChipsWrap').style.display = tab === 'garden' ? 'flex' : 'none';

  if (tab === 'compare') {
    if (S.year === TODAY_YEAR) S.year = TODAY_YEAR - 1;
    loadCompare().then(scrollTop);
  } else if (tab === 'timeline') {
    S.year = TODAY_YEAR;
    loadTimeline().then(scrollTop);
  } else {
    S.year = TODAY_YEAR;
    loadGardenTab().then(scrollTop);
  }
}

// ── Load: 畑タブ（年変更・エリア変更時） ──────────────
async function loadGardenTab() {
  // 日付チップを先に取得してデフォルト日付を決定し、それでマップを取得
  const defaultDate = await loadDates(S.year);
  await loadGardenMap(defaultDate);
}

// ── Load: 畑マップ（特定日付） ────────────────────────
async function loadGardenMap(dateStr) {
  closeDetail();
  const res  = await fetch(`${API_STATE(S.areaId)}?date=${dateStr}`);
  const data = await res.json();
  buildYearChips(data.available_years);
  updateScrubCaption();
  renderGarden(data);
}

// ── Load compare ───────────────────────────────────────
async function loadCompare() {
  closeDetail();
  const [resNow, resPast] = await Promise.all([
    fetch(`${API_STATE(S.areaId)}?year=${TODAY_YEAR}`),
    fetch(`${API_STATE(S.areaId)}?year=${compareYear()}`),
  ]);
  const now  = await resNow.json();
  const past = await resPast.json();
  buildYearChips(now.available_years);
  updateScrubCaption();
  renderCompare(now, past);
}

// ── Load timeline ──────────────────────────────────────
async function loadTimeline() {
  closeDetail();
  const res   = await fetch(`${API_STATE(S.areaId)}?year=${TODAY_YEAR}`);
  const first = await res.json();
  const years = first.available_years;
  const allData = await Promise.all(
    years.map(y => fetch(`${API_STATE(S.areaId)}?year=${y}`).then(r => r.json()))
  );
  buildYearChips(years);
  updateScrubCaption();
  renderTimeline(years, allData);
}

function scrollTop() {
  requestAnimationFrame(() => {
    document.getElementById('tabBody').scrollTop = 0;
  });
}

// ══════════════════════════════════════════════════════
// ── Render: Garden map ────────────────────────────────
// ══════════════════════════════════════════════════════
function renderGarden(data) {
  _currentGarden = data;
  const area = data.area;
  const content = document.getElementById('tabContent');
  content.innerHTML = '';

  // Banner if past year
  if (data.year !== TODAY_YEAR) {
    const banner = document.createElement('div');
    banner.className = 'banner';
    banner.innerHTML = `
      <span class="banner-text">${data.year}年ごろの記録を表示中</span>
      <button class="btn-now" id="bannerNowBtn">今にもどる</button>`;
    banner.style.marginBottom = '10px';
    content.appendChild(banner);
    banner.querySelector('#bannerNowBtn').addEventListener('click', () => {
      S.year = TODAY_YEAR;
      loadState();
    });
  }

  // Title row
  const titleRow = el('div', 'map-title-row');
  const titleSpan = el('span', 'map-title'); titleSpan.textContent = area.name;
  titleRow.appendChild(titleSpan);
  const addBedBtn = el('button', 'btn-add-bed');
  addBedBtn.textContent = '+ 畝を追加';
  addBedBtn.addEventListener('click', () => openAddBedForm(_currentGarden));
  titleRow.appendChild(addBedBtn);
  content.appendChild(titleRow);

  // Map
  const map = el('div', 'garden-map');
  map.style.aspectRatio = `${area.cols} / ${area.rows}`;
  map.style.marginBottom = '8px';
  map.style.marginTop = '4px';

  // 3m(30マス)ごとに濃淡ストライプ
  const sp  = (60 / area.rows * 100).toFixed(4);   // 1ストライプの%（3m=60マス）
  const sp2 = (60 / area.rows * 200).toFixed(4);   // 繰り返し幅の%
  map.style.background =
    `repeating-linear-gradient(to bottom,` +
    `transparent 0%,transparent ${sp}%,` +
    `rgba(0,0,0,0.05) ${sp}%,rgba(0,0,0,0.05) ${sp2}%),` +
    `linear-gradient(to bottom,#d6cbb3,#cdc2a9)`;

  const woodV = 'repeating-linear-gradient(90deg,#cdb083 0,#cdb083 4px,#bb9e6c 4px,#bb9e6c 5px)';
  const woodH = 'repeating-linear-gradient(0deg,#cdb083 0,#cdb083 4px,#bb9e6c 4px,#bb9e6c 5px)';

  // SVGグリッド＋目盛り（畝ボタンの下に描画）
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', `0 0 ${area.cols} ${area.rows}`);
  svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none';

  const mkLine = (x1, y1, x2, y2, stroke, sw) => {
    const l = document.createElementNS(ns, 'line');
    l.setAttribute('x1', x1); l.setAttribute('y1', y1);
    l.setAttribute('x2', x2); l.setAttribute('y2', y2);
    l.setAttribute('stroke', stroke);
    l.setAttribute('stroke-width', sw);
    svg.appendChild(l);
  };

  // 縦グリッド（1mごと = 20マスごと）
  for (let c = 20; c < area.cols; c += 20) {
    mkLine(c, 0, c, area.rows, 'rgba(0,0,0,0.07)', '0.25');
  }
  // 横グリッド（1mごと = 20マスごと）
  for (let r = 20; r < area.rows; r += 20) {
    mkLine(0, r, area.cols, r, 'rgba(0,0,0,0.07)', '0.25');
  }

  // 3m目盛りラベル（左端）
  for (let r = 0; r <= area.rows; r += 60) {
    const isFirst = r === 0;
    const isLast  = r === area.rows;
    const labelY  = isFirst ? r + 0.8 : isLast ? r - 5.6 : r - 2.4;
    // 背景
    const bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('x', '0.8'); bg.setAttribute('y', String(labelY));
    bg.setAttribute('width', '11'); bg.setAttribute('height', '4.8');
    bg.setAttribute('rx', '1.4');
    bg.setAttribute('fill', 'rgba(246,242,232,0.82)');
    svg.appendChild(bg);
    // テキスト
    const txt = document.createElementNS(ns, 'text');
    txt.setAttribute('x', '6.4');
    txt.setAttribute('y', String(labelY + 2.4));
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('dominant-baseline', 'middle');
    txt.setAttribute('font-size', '3.8');
    txt.setAttribute('font-family', 'sans-serif');
    txt.setAttribute('font-weight', '700');
    txt.setAttribute('fill', 'rgba(80,58,28,0.65)');
    txt.textContent = `${r / 20}m`;
    svg.appendChild(txt);
  }

  map.appendChild(svg);

  data.beds.forEach(bed => {
    const btn = el('button', bed.crop ? 'bed-btn' : 'bed-btn empty');
    const left   = (bed.col_start / area.cols) * 100;
    const top    = (bed.row_start / area.rows) * 100;
    const width  = ((bed.col_end - bed.col_start + 1) / area.cols) * 100;
    const height = ((bed.row_end - bed.row_start + 1) / area.rows) * 100;
    btn.style.cssText = `left:${left}%;top:${top}%;width:${width}%;height:${height}%`;

    if (bed.crop) {
      const isV = (bed.row_end - bed.row_start) > (bed.col_end - bed.col_start);
      btn.style.background = isV ? woodV : woodH;

      const chip = el('span', 'bed-chip');
      const dot  = el('span', 'bed-dot');
      dot.style.background = bed.crop.family_color;
      const name = el('span', 'bed-name');
      name.textContent = bed.crop.name;
      chip.appendChild(dot); chip.appendChild(name);
      btn.appendChild(chip);

      if (bed.rotation.level === 'high' || bed.rotation.level === 'mid') {
        const wd = el('span', 'warn-dot');
        wd.style.background = bed.rotation.level === 'high' ? '#b3564a' : '#c0883a';
        btn.appendChild(wd);
      }
    } else {
      const chip = el('span', 'bed-empty-chip');
      const dot  = el('span', 'bed-empty-dot');
      const name = el('span', 'bed-empty-name');
      name.textContent = '空き';
      chip.appendChild(dot); chip.appendChild(name);
      btn.appendChild(chip);
    }

    btn.addEventListener('click', () => openDetail(bed.id, S.date));
    map.appendChild(btn);
  });

  content.appendChild(map);

  // Legend
  const families = [...new Set(
    data.beds.filter(b => b.crop).map(b => ({name: b.crop.family, color: b.crop.family_color}))
      .map(f => JSON.stringify(f))
  )].map(s => JSON.parse(s));

  if (families.length) {
    const legend = el('div', 'legend-wrap');
    families.forEach(f => {
      const item = el('div', 'legend-item');
      const dot  = el('span', 'legend-dot');
      dot.style.background = f.color;
      const name = el('span', 'legend-name');
      name.textContent = f.name;
      item.appendChild(dot); item.appendChild(name);
      legend.appendChild(item);
    });
    content.appendChild(legend);
  }

  const hint = el('div', 'map-hint');
  hint.textContent = '畝をタップで作物の記録・連作チェックを表示';
  content.appendChild(hint);
}

// ══════════════════════════════════════════════════════
// ── Render: Compare ───────────────────────────────────
// ══════════════════════════════════════════════════════
function renderCompare(now, past) {
  const content = document.getElementById('tabContent');
  content.innerHTML = '';

  const head = el('div', 'compare-head');
  head.innerHTML = `
    <div class="compare-col-head">
      <div class="compare-col-label">今</div>
      <div class="compare-col-sub">${TODAY_YEAR}年</div>
    </div>
    <div class="compare-col-head">
      <div class="compare-col-label past">過去の同時期</div>
      <div class="compare-col-sub">${compareYear()}年</div>
    </div>`;
  content.appendChild(head);

  // Build a map from bed id → crop for now and past
  const nowMap  = Object.fromEntries(now.beds.map(b => [b.id, b]));
  const pastMap = Object.fromEntries(past.beds.map(b => [b.id, b]));
  const allBedIds = [...new Set([...now.beds.map(b=>b.id), ...past.beds.map(b=>b.id)])];

  allBedIds.forEach(id => {
    const nb = nowMap[id];
    const pb = pastMap[id];
    const bedName = (nb || pb).name;
    const rot  = nb?.rotation || {level:'none'};
    const rc   = ROT_COLOR[rot.level] || ROT_COLOR.none;
    const flagLabels = {high:'連作注意', mid:'2年連続', low:'やや注意'};

    const row  = el('div', 'compare-row');
    const rowHead = el('div', 'compare-row-head');
    const lbl  = el('span', 'compare-row-label');
    lbl.textContent = bedName;
    rowHead.appendChild(lbl);
    if (rot.level === 'high' || rot.level === 'mid' || rot.level === 'low') {
      const flag = el('span', 'compare-flag');
      flag.textContent = flagLabels[rot.level];
      flag.style.cssText = `background:${rc.bg};color:${rc.c}`;
      rowHead.appendChild(flag);
    }
    row.appendChild(rowHead);

    const cols = el('div', 'compare-cols');
    [['now', nb?.crop], ['past', pb?.crop]].forEach(([side, crop]) => {
      const cell = el('div', 'compare-cell');
      if (crop) {
        cell.style.cssText = `background:${crop.family_tint};border:1px solid ${crop.family_color}40`;
        const name = el('span', 'compare-cell-name');
        name.style.color = crop.family_color;
        name.textContent = crop.name;
        const sub = el('span', 'compare-cell-sub');
        sub.textContent = crop.family;
        cell.appendChild(name); cell.appendChild(sub);
      } else {
        cell.style.cssText = 'background:#f1ecdd;border:1.5px dashed #cfc8b4';
        const name = el('span', 'compare-cell-name empty');
        name.textContent = '空き';
        const sub = el('span', 'compare-cell-sub');
        sub.textContent = side === 'past' ? '未記録' : '';
        cell.appendChild(name); cell.appendChild(sub);
      }
      cols.appendChild(cell);
    });
    row.appendChild(cols);
    content.appendChild(row);
  });

  const hint = el('div', 'compare-hint');
  hint.textContent = '上の年スクラバーで比較する年を切り替え';
  content.appendChild(hint);
}

// ══════════════════════════════════════════════════════
// ── Render: Timeline ──────────────────────────────────
// ══════════════════════════════════════════════════════
function renderTimeline(years, allData) {
  const content = document.getElementById('tabContent');
  content.innerHTML = '';

  const card = el('div', 'tl-card');
  const cols = years.length;

  // Head row
  const head = el('div', 'tl-head');
  head.style.gridTemplateColumns = `30px ${years.map(() => '1fr').join(' ')}`;
  const empty = el('div'); head.appendChild(empty);
  years.forEach((y, i) => {
    const cell = el('div', 'tl-head-cell' + (y === S.year ? ' active' : ''));
    cell.textContent = String(y);
    head.appendChild(cell);
  });
  card.appendChild(head);

  // Collect all bed ids in order (from first year's data or sorted)
  const bedOrder = allData[allData.length - 1]?.beds.map(b => b.id) || [];
  const bedNames = {};
  allData.forEach(d => d.beds.forEach(b => { bedNames[b.id] = b.name; }));
  // Merge any bed ids not in latest year
  allData.forEach(d => d.beds.forEach(b => {
    if (!bedOrder.includes(b.id)) bedOrder.push(b.id);
  }));

  // Build cropMap: bedId → year → crop
  const cropMap = {};
  allData.forEach((d, i) => {
    const y = years[i];
    d.beds.forEach(b => {
      if (!cropMap[b.id]) cropMap[b.id] = {};
      cropMap[b.id][y] = b.crop;
    });
  });

  bedOrder.forEach(bedId => {
    const row = el('div', 'tl-row-grid');
    row.style.gridTemplateColumns = `30px ${years.map(() => '1fr').join(' ')}`;
    const label = el('div', 'tl-row-label');
    label.textContent = bedNames[bedId] || '';
    row.appendChild(label);

    years.forEach((y, i) => {
      const crop = cropMap[bedId]?.[y];
      const isActiveYear = y === S.year;
      const btn = el('button', 'tl-cell' + (crop ? '' : ' empty'));
      btn.textContent = crop ? crop.name : '—';
      if (crop) {
        btn.style.cssText = `background:${crop.family_tint};color:${crop.family_color}`;
        if (isActiveYear) {
          btn.style.border = `2px solid var(--accent)`;
        } else {
          btn.style.border = `1px solid ${crop.family_color}40`;
        }
      } else if (isActiveYear) {
        btn.classList.add('active-border');
        btn.style.borderColor = 'var(--accent)';
      }
      btn.addEventListener('click', () => {
        S.year = y;
        const detailDate = (y === TODAY_YEAR) ? TODAY : `${y}-12-31`;
        openDetail(bedId, detailDate);
      });
      row.appendChild(btn);
    });
    card.appendChild(row);
  });

  content.appendChild(card);

  // Legend
  const famSet = {};
  allData.forEach(d => d.beds.forEach(b => {
    if (b.crop) famSet[b.crop.family] = b.crop.family_color;
  }));
  if (Object.keys(famSet).length) {
    const legend = el('div', 'tl-legend');
    Object.entries(famSet).slice(0, 8).forEach(([name, color]) => {
      const item = el('div', 'legend-item');
      const dot  = el('span', 'legend-dot');
      dot.style.background = color;
      const lbl  = el('span', 'legend-name');
      lbl.textContent = name;
      item.appendChild(dot); item.appendChild(lbl);
      legend.appendChild(item);
    });
    content.appendChild(legend);
  }
}

// ナビ操作後のゴーストクリック対策
let _navTs = 0;
function markNav() { _navTs = Date.now(); }

// 「今にもどる」バナーボタン用
function loadState() {
  closeDetail();
  markNav();
  loadGardenTab();
}

async function openDetail(bedId, dateStr) {
  if (Date.now() - _navTs < 500) return;  // ナビ直後のゴーストクリックを無視
  const res  = await fetch(`${API_DETAIL(bedId)}?date=${dateStr}`);
  const data = await res.json();
  renderDetail(data);
  document.getElementById('overlay').classList.add('show');
  document.getElementById('detailSheet').classList.add('show');
}

function closeDetail() {
  _adjOpen     = false;
  _cropAdjOpen = {};
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('detailSheet').classList.remove('show');
}

// ══════════════════════════════════════════════════════
// ── Template mini-map ─────────────────────────────────
// ══════════════════════════════════════════════════════
function _buildTmplMap(area, beds, onSelect) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  // Landscape: row axis → X (18m), col axis → Y (7m)
  svg.setAttribute('viewBox', `0 0 ${area.rows} ${area.cols}`);
  svg.style.cssText = `width:100%;display:block;cursor:default;`;
  svg.style.aspectRatio = `${area.rows} / ${area.cols}`;

  // Background
  const bg = document.createElementNS(ns, 'rect');
  bg.setAttribute('x','0'); bg.setAttribute('y','0');
  bg.setAttribute('width', area.rows); bg.setAttribute('height', area.cols);
  bg.setAttribute('fill', '#cdc2a9');
  svg.appendChild(bg);

  // 1m grid lines (every 10 grid units)
  for (let r = 10; r < area.rows; r += 10) {
    const l = document.createElementNS(ns, 'line');
    l.setAttribute('x1', r); l.setAttribute('y1', 0);
    l.setAttribute('x2', r); l.setAttribute('y2', area.cols);
    l.setAttribute('stroke', 'rgba(0,0,0,0.07)'); l.setAttribute('stroke-width', '0.25');
    svg.appendChild(l);
  }

  beds.forEach(bed => {
    const g = document.createElementNS(ns, 'g');
    g.style.cursor = 'pointer';

    // In landscape: x=row_start, y=col_start, w=rows span, h=cols span
    const bx = bed.row_start;
    const by = bed.col_start;
    const bw = bed.row_end - bed.row_start + 1;
    const bh = bed.col_end  - bed.col_start + 1;

    const r = document.createElementNS(ns, 'rect');
    r.setAttribute('x', bx); r.setAttribute('y', by);
    r.setAttribute('width', bw); r.setAttribute('height', bh);
    r.setAttribute('fill', '#c8b68a');
    r.setAttribute('stroke', '#a98f63'); r.setAttribute('stroke-width', '0.4');
    r.setAttribute('rx', '1'); r.setAttribute('ry', '1');
    r.dataset.bedId = bed.id;

    const fs = Math.min(9, bh * 0.52, bw * 0.13).toFixed(1);
    const txt = document.createElementNS(ns, 'text');
    txt.setAttribute('x', bx + bw / 2); txt.setAttribute('y', by + bh / 2);
    txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('dominant-baseline', 'middle');
    txt.setAttribute('font-size', fs); txt.setAttribute('font-family', 'sans-serif');
    txt.setAttribute('font-weight', '700'); txt.setAttribute('fill', '#5a4020');
    txt.setAttribute('pointer-events', 'none');
    txt.textContent = bed.name;

    g.appendChild(r); g.appendChild(txt);

    g.addEventListener('click', () => {
      svg.querySelectorAll('[data-bed-id]').forEach(el => {
        el.setAttribute('fill', '#c8b68a');
        el.setAttribute('stroke', '#a98f63'); el.setAttribute('stroke-width', '0.4');
      });
      r.setAttribute('fill', '#b8d4a8');
      r.setAttribute('stroke', '#5d8a55'); r.setAttribute('stroke-width', '1.5');
      onSelect(bed);
    });

    svg.appendChild(g);
  });

  return svg;
}

// ══════════════════════════════════════════════════════
// ── Add bed form ──────────────────────────────────────
// ══════════════════════════════════════════════════════
function openAddBedForm(gardenData) {
  const area    = gardenData.area;
  const lenCm   = area.rows * 5;
  const widCm   = area.cols * 5;
  const years   = gardenData.available_years || [];

  // デフォルト位置: 現在表示中の畝の最下端 + 40cm ギャップ
  const curBeds = gardenData.beds || [];
  let defRowStart = 0;
  if (curBeds.length > 0) {
    defRowStart = (Math.max(...curBeds.map(b => b.row_end)) + 1 + 8) * 5;  // +8 = 40cmギャップ
  }
  const defRowEnd = Math.min(lenCm - 5, defRowStart + 80);

  const c = document.getElementById('detailContent');
  c.innerHTML = '';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('detailSheet').classList.add('show');

  const form = el('div', 'log-form');

  // ── ヘッダー ──────────────────────────────────────────
  const topRow = el('div', 'detail-top');
  const titleWrap = el('div');
  const title = el('div', 'log-form-title'); title.textContent = '畝を追加';
  titleWrap.appendChild(title);
  const closeBtn = el('button', 'btn-close'); closeBtn.textContent = '✕';
  closeBtn.addEventListener('click', closeDetail);
  topRow.appendChild(titleWrap); topRow.appendChild(closeBtn);
  form.appendChild(topRow);

  // ── 畝の名前 ─────────────────────────────────────────
  const nameSec = el('div');
  const nameLbl = el('div', 'form-label'); nameLbl.textContent = '畝の名前';
  const nameInp = el('input');
  nameInp.type = 'text'; nameInp.className = 'log-date-input';
  nameInp.placeholder = '例：1番畝、北側の畝…';
  nameSec.appendChild(nameLbl); nameSec.appendChild(nameInp);
  form.appendChild(nameSec);

  // ── 畝立て日 ─────────────────────────────────────────
  const dateSec = el('div');
  const dateLbl = el('div', 'form-label'); dateLbl.textContent = '畝立て日';
  const dateInp = el('input');
  dateInp.type = 'date'; dateInp.className = 'log-date-input';
  dateInp.value = TODAY; dateInp.max = TODAY;
  dateSec.appendChild(dateLbl); dateSec.appendChild(dateInp);
  form.appendChild(dateSec);

  // ── 位置・サイズ（inputs を先に定義してテンプレートと共有） ──
  const inputs = {};
  const posDefs = [
    {key:'rowStart', label:'上端（上から）', val: defRowStart, max: lenCm - 5},
    {key:'rowEnd',   label:'下端（上から）', val: defRowEnd,   max: lenCm - 5},
    {key:'colStart', label:'左端（左から）', val: 0,           max: widCm - 5},
    {key:'colEnd',   label:'右端（左から）', val: widCm - 5,   max: widCm - 5},
  ];

  // ── テンプレートを選ぶ ────────────────────────────────
  const tmplSec = el('div');
  const tmplLbl = el('div', 'form-label'); tmplLbl.textContent = 'テンプレートを選ぶ（任意）';
  tmplSec.appendChild(tmplLbl);

  // 年チップ
  const yearChips = el('div', 'add-bed-tmpl-year-chips');
  const mapWrap = el('div', 'add-bed-tmpl-map-wrap');
  mapWrap.style.display = 'none';
  const mapHint = el('div', 'add-bed-tmpl-hint');
  mapHint.textContent = '畝をタップして選択';
  mapHint.style.display = 'none';
  const tmplInfo = el('div', 'add-bed-tmpl-info');
  tmplInfo.style.display = 'none';

  years.forEach(y => {
    const chip = el('button', 'add-bed-tmpl-year-chip');
    chip.type = 'button'; chip.textContent = `${y}年`;
    chip.addEventListener('click', async () => {
      yearChips.querySelectorAll('.add-bed-tmpl-year-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      tmplInfo.style.display = 'none';
      mapWrap.innerHTML = '<div style="padding:12px;font-size:11px;color:#a79e88;text-align:center">読み込み中…</div>';
      mapWrap.style.display = '';
      mapHint.style.display = 'none';

      const data = await fetch(`${API_STATE(S.areaId)}?year=${y}`).then(r => r.json());
      mapWrap.innerHTML = '';

      if (!data.beds || !data.beds.length) {
        mapWrap.innerHTML = '<div style="padding:10px;font-size:11px;color:#a79e88;text-align:center">その年の畝はありません</div>';
        return;
      }

      const svg = _buildTmplMap(area, data.beds, bed => {
        const h = (bed.row_end - bed.row_start + 1) * 5;  // 縦（row方向）cm
        const w = (bed.col_end - bed.col_start + 1) * 5;  // 横（col方向）cm
        inputs.rowStart.value = bed.row_start * 5;
        inputs.rowEnd.value   = bed.row_end   * 5;
        inputs.colStart.value = bed.col_start * 5;
        inputs.colEnd.value   = bed.col_end   * 5;
        const nameEl = tmplInfo.querySelector('.tmpl-sel-name');
        const subEl  = tmplInfo.querySelector('.add-bed-tmpl-info-sub');
        nameEl.textContent = `「${bed.name}」を選択中`;
        subEl.textContent  = `縦 ${h}cm × 横 ${w}cm`;
        tmplInfo.style.display = 'flex';
        setTimeout(() => posSec.scrollIntoView({block:'nearest', behavior:'smooth'}), 80);
      });
      mapWrap.appendChild(svg);
      mapHint.style.display = '';
    });
    yearChips.appendChild(chip);
  });

  const nameEl = el('span', 'tmpl-sel-name');
  const subEl  = el('span', 'add-bed-tmpl-info-sub');
  tmplInfo.appendChild(nameEl); tmplInfo.appendChild(subEl);

  tmplSec.appendChild(yearChips);
  tmplSec.appendChild(mapWrap);
  tmplSec.appendChild(mapHint);
  tmplSec.appendChild(tmplInfo);
  form.appendChild(tmplSec);

  // ── 位置・サイズ入力 ─────────────────────────────────
  const posSec = el('div');
  const posLbl = el('div', 'form-label'); posLbl.textContent = '位置とサイズ（cm）';
  const posHint = el('div', 'add-bed-pos-hint');
  posHint.textContent = `畑全体: 縦${lenCm}cm × 横${widCm}cm　上・左が 0cm`;
  const posGrid = el('div', 'add-bed-pos-grid');
  posSec.appendChild(posLbl); posSec.appendChild(posHint); posSec.appendChild(posGrid);

  posDefs.forEach(({key, label, val, max}) => {
    const row = el('div', 'plant-range-row');
    const lbl = el('span', 'plant-range-label'); lbl.textContent = label;
    const inp = el('input');
    inp.type = 'number'; inp.className = 'plant-range-input';
    inp.min = 0; inp.max = max; inp.step = 5; inp.value = val;
    const unit = el('span', 'plant-range-unit'); unit.textContent = 'cm';
    row.appendChild(lbl); row.appendChild(inp); row.appendChild(unit);
    posGrid.appendChild(row);
    inputs[key] = inp;
  });
  form.appendChild(posSec);

  // ── 追加ボタン ────────────────────────────────────────
  const submitBtn = el('button', 'log-submit');
  submitBtn.textContent = '追加する';
  submitBtn.addEventListener('click', async () => {
    const name = nameInp.value.trim();
    if (!name) { nameInp.focus(); return; }
    submitBtn.disabled = true;
    try {
      const res = await fetch(API_BED_ADD(area.id), {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
        body: JSON.stringify({
          name,
          created_at:   dateInp.value,
          row_start_cm: parseInt(inputs.rowStart.value) || 0,
          row_end_cm:   parseInt(inputs.rowEnd.value)   || 80,
          col_start_cm: parseInt(inputs.colStart.value) || 0,
          col_end_cm:   parseInt(inputs.colEnd.value)   || widCm - 10,
        }),
      });
      if (!res.ok) throw new Error();
      closeDetail();
      await loadGardenTab();
    } catch {
      submitBtn.disabled = false;
      alert('保存に失敗しました。');
    }
  });
  form.appendChild(submitBtn);

  c.appendChild(form);
}

let _ps = {};  // plant state

async function openPlantForm(bed, dateStr) {
  _ps = {bed, dateStr, vt: null, plantedAt: TODAY, variety: '', positions: [], rsOff: 0, reOff: 0, plantCount: 1};

  const c = document.getElementById('detailContent');
  c.innerHTML = '<div style="text-align:center;padding:24px;color:#a79e88;font-size:13px">読み込み中…</div>';

  const {families} = await fetch(API_VEG_TYPES()).then(r => r.json());
  c.innerHTML = '';

  const form = el('div', 'log-form');

  // 戻る
  const back = el('button', 'log-form-back');
  back.innerHTML = '&#8592; 詳細に戻る';
  back.addEventListener('click', () => openDetail(bed.id, dateStr));
  form.appendChild(back);

  const title = el('div', 'log-form-title');
  title.textContent = 'この畝に植える';
  form.appendChild(title);

  // 畝サイズ表示
  const bedLen = (bed.row_end - bed.row_start + 1) * 5;
  const bedWid = (bed.col_end - bed.col_start + 1) * 5;
  const bedInfo = el('div', 'plant-bed-info');
  bedInfo.textContent = `${bed.name}　${bedLen}cm × ${bedWid}cm`;
  form.appendChild(bedInfo);

  // 野菜選択
  const vtLabel = el('div', 'form-label');
  vtLabel.textContent = '野菜を選ぶ';
  form.appendChild(vtLabel);

  const allChips = [];
  const vtWrap = el('div');

  families.forEach(fam => {
    const famWrap = el('div', 'plant-fam-wrap');
    const famHdr = el('div', 'plant-fam-label');
    famHdr.textContent = fam.name;
    famHdr.style.color = fam.color;
    famWrap.appendChild(famHdr);

    const chips = el('div', 'plant-vt-chips');
    fam.types.forEach(vt => {
      const chip = el('button', 'plant-vt-chip');
      chip.type = 'button';
      chip.textContent = vt.name;
      chip.addEventListener('click', () => {
        allChips.forEach(ch => { ch.classList.remove('selected'); ch.style.cssText = ''; });
        chip.classList.add('selected');
        chip.style.cssText = `background:${fam.color};color:#fff;border-color:${fam.color}`;
        _ps.vt = {...vt, family_color: fam.color, family_name: fam.name};
        _ps.rsOff = 0;
        _ps.reOff = bed.row_end - bed.row_start;
        _buildPlantRangeSec(rangeSec, bed, bedLen);
        submitBtn.style.display = '';
        setTimeout(() => rangeSec.scrollIntoView({block:'nearest', behavior:'smooth'}), 60);
      });
      chips.appendChild(chip);
      allChips.push(chip);
    });
    famWrap.appendChild(chips);
    vtWrap.appendChild(famWrap);
  });

  // 植付設定セクション（選択後に展開）

  submitBtn.textContent = '植える';
  submitBtn.style.display = 'none';
  submitBtn.addEventListener('click', _doPlant);
  form.appendChild(submitBtn);

  c.appendChild(form);
}

function _buildPlantRangeSec(sec, bed, bedLen) {
  sec.innerHTML = '';
  sec.style.display = '';
  const vt = _ps.vt;

  // 植付方法バッジ
  const METHOD_JP = {individual:'個体植え', row:'筋蒔き', block:'まとめ植え'};
  const badge = el('span', 'plant-method-badge');
  badge.textContent = METHOD_JP[vt.planting_method] || vt.planting_method;
  badge.style.cssText = `background:${vt.family_color}22;color:${vt.family_color};border:1px solid ${vt.family_color}55`;
  sec.appendChild(badge);

  if (vt.planting_method === 'individual') {
    _buildIndividualSec(sec, bed, bedLen);
  } else {
    _buildAreaSec(sec, bed, bedLen);
  }

  // 品種
  const varSec = el('div');
  const varLbl = el('div', 'form-label'); varLbl.textContent = '品種（任意）';
  const varInp = el('input');
  varInp.type = 'text'; varInp.className = 'log-date-input';
  varInp.placeholder = '例：桃太郎、黒陽…';
  varInp.addEventListener('input', () => { _ps.variety = varInp.value; });
  varSec.appendChild(varLbl); varSec.appendChild(varInp);
  sec.appendChild(varSec);

  // 植え付け日
  const dateSec = el('div');
  const dateLbl = el('div', 'form-label'); dateLbl.textContent = '植え付け日';
  const dateInp = el('input');
  dateInp.type = 'date'; dateInp.className = 'log-date-input';
  dateInp.value = TODAY; dateInp.max = TODAY;
  dateInp.addEventListener('change', () => { _ps.plantedAt = dateInp.value; });
  dateSec.appendChild(dateLbl); dateSec.appendChild(dateInp);
  sec.appendChild(dateSec);
}

function _buildIndividualSec(sec, bed, bedLen) {
  const vt = _ps.vt;
  const spacingCells = Math.max(1, Math.round(vt.spacing_cm / 5));

  // 開始位置
  const startRow = el('div', 'plant-range-row');
  const startLbl = el('span', 'plant-range-label'); startLbl.textContent = '開始位置';
  const startInp = el('input');
  startInp.type = 'number'; startInp.className = 'plant-range-input';
  startInp.min = 0; startInp.max = Math.max(0, bedLen - 5); startInp.step = 5; startInp.value = 0;
  const startUnit = el('span', 'plant-range-unit');
  startUnit.textContent = `cm（0〜${bedLen - 5}cm）`;
  startRow.appendChild(startLbl); startRow.appendChild(startInp); startRow.appendChild(startUnit);
  sec.appendChild(startRow);

  // 株間情報
  const spInfo = el('div', 'plant-spacing-info');
  spInfo.textContent = `推奨株間: ${vt.spacing_cm}cm`;
  sec.appendChild(spInfo);

  // 株数ステッパー
  const countRow = el('div', 'plant-count-row');
  const countLbl = el('span', 'plant-count-label'); countLbl.textContent = '株数';
  const stepper = el('div', 'plant-count-stepper');
  const minusBtn = el('button', 'plant-count-btn');
  minusBtn.type = 'button'; minusBtn.textContent = '−';
  const countDisp = el('span', 'plant-count-val');
  const plusBtn = el('button', 'plant-count-btn');
  plusBtn.type = 'button'; plusBtn.textContent = '+';
  stepper.appendChild(minusBtn); stepper.appendChild(countDisp); stepper.appendChild(plusBtn);
  countRow.appendChild(countLbl); countRow.appendChild(stepper);
  sec.appendChild(countRow);

  // プレビュー
  const prevLbl = el('div', 'form-label'); prevLbl.textContent = '配置プレビュー';
  const preview = el('div', 'plant-preview');
  sec.appendChild(prevLbl); sec.appendChild(preview);

  function autoCount() {
    const startCm = parseInt(startInp.value) || 0;
    return Math.max(1, Math.floor((bedLen - startCm) / vt.spacing_cm) + 1);
  }

  function calcPositions() {
    const startGrid = Math.floor((parseInt(startInp.value) || 0) / 5);
    return Array.from({length: _ps.plantCount}, (_, i) => startGrid + i * spacingCells);
  }

  function refresh() {
    countDisp.textContent = _ps.plantCount;
    _ps.positions = calcPositions();
    preview.innerHTML = '';
    _ps.positions.forEach((p, i) => {
      if (i > 0) {
        const line = el('div', 'plant-prev-line');
        preview.appendChild(line);
      }
      const item = el('div', 'plant-prev-item');
      const dot  = el('div', 'plant-prev-dot');
      dot.style.background = vt.family_color;
      const lbl  = el('div', 'plant-prev-lbl');
      lbl.textContent = `${p * 5 - bed.row_start * 5}cm`;
      item.appendChild(dot); item.appendChild(lbl);
      preview.appendChild(item);
    });
  }

  _ps.plantCount = autoCount();
  refresh();

  startInp.addEventListener('input', () => { _ps.plantCount = autoCount(); refresh(); });
  minusBtn.addEventListener('click', () => { if (_ps.plantCount > 1) { _ps.plantCount--; refresh(); } });
  plusBtn.addEventListener('click', () => { _ps.plantCount++; refresh(); });
}

function _buildAreaSec(sec, bed, bedLen) {
  const makeRow = (labelText, defaultVal, maxVal, unitText, onChange) => {
    const row = el('div', 'plant-range-row');
    const lbl = el('span', 'plant-range-label'); lbl.textContent = labelText;
    const inp = el('input');
    inp.type = 'number'; inp.className = 'plant-range-input';
    inp.min = 0; inp.max = maxVal; inp.step = 5; inp.value = defaultVal;
    const unit = el('span', 'plant-range-unit'); unit.textContent = unitText;
    inp.addEventListener('input', () => onChange(parseInt(inp.value) || 0));
    row.appendChild(lbl); row.appendChild(inp); row.appendChild(unit);
    sec.appendChild(row);
  };

  makeRow('開始位置', 0, bedLen, 'cm',
    v => { _ps.rsOff = Math.floor(v / 5); });
  makeRow('終了位置', bedLen, bedLen, `cm（最大 ${bedLen}cm）`,
    v => { _ps.reOff = Math.floor(v / 5); });
}

async function _doPlant() {
  const {bed, dateStr, vt, plantedAt, variety, positions, rsOff, reOff} = _ps;
  if (!vt) return;

  const body = {
    vegetable_type_id: vt.id,
    planted_at: plantedAt || TODAY,
    variety: variety || '',
    method: vt.planting_method,
  };
  if (vt.planting_method === 'individual') {
    body.positions = positions || [];
  } else {
    body.row_start_offset = rsOff || 0;
    body.row_end_offset   = reOff ?? (bed.row_end - bed.row_start);
  }

  try {
    const res = await fetch(API_BED_PLANT(bed.id), {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error();
    await openDetail(bed.id, dateStr);
    const mapData = await fetch(`${API_STATE(S.areaId)}?date=${S.date}`).then(r => r.json());
    renderGarden(mapData);
  } catch {
    alert('保存に失敗しました。');
  }
}

function _buildAdjPanel(title, isOpen, onToggle, buildBody) {
  const panel = el('div', 'adj-panel');
  const toggle = el('button', 'adj-toggle' + (isOpen ? ' open' : ''));
  toggle.type = 'button';
  const tlbl = el('span'); tlbl.textContent = title;
  const tarr = el('span', 'adj-toggle-arrow'); tarr.textContent = '▼';
  toggle.appendChild(tlbl); toggle.appendChild(tarr);

  const body = el('div', 'adj-body');
  body.style.display = isOpen ? '' : 'none';

  toggle.addEventListener('click', () => {
    const next = body.style.display === 'none';
    body.style.display = next ? '' : 'none';
    toggle.classList.toggle('open', next);
    onToggle(next);
  });

  panel.appendChild(toggle);
  panel.appendChild(body);
  buildBody(body);  // body が panel に追加された後なので body.parentElement = panel
  return panel;
}

function _mkMoveGrid(onClick) {
  const grid = el('div', 'adj-move-grid');
  // 3×3: _ ↑ _ / ← _ → / _ ↓ _
  [null, {i:'↑',r:-1,c:0}, null,
   {i:'←',r:0,c:-1}, null, {i:'→',r:0,c:1},
   null, {i:'↓',r:1,c:0}, null
  ].forEach(d => {
    if (!d) { grid.appendChild(el('div')); return; }
    const btn = el('button', 'adj-btn');
    btn.type = 'button'; btn.textContent = d.i;
    btn.addEventListener('click', () => onClick(d.r, d.c));
    grid.appendChild(btn);
  });
  return grid;
}

function _mkEdgeGrid(onEdge) {
  const grid = el('div', 'adj-edge-grid');
  [
    {label:'上端', key:'drs', plus:-1, minus:+1},
    {label:'下端', key:'dre', plus:+1, minus:-1},
    {label:'左端', key:'dcs', plus:-1, minus:+1},
    {label:'右端', key:'dce', plus:+1, minus:-1},
  ].forEach(e => {
    const row = el('div', 'adj-edge-row');
    const lbl = el('span', 'adj-edge-label'); lbl.textContent = e.label;
    const btns = el('div', 'adj-edge-btns');
    const mBtn = el('button', 'adj-btn-sm'); mBtn.type='button'; mBtn.textContent='−';
    mBtn.addEventListener('click', () => onEdge(e.key, e.minus));
    const pBtn = el('button', 'adj-btn-sm'); pBtn.type='button'; pBtn.textContent='＋';
    pBtn.addEventListener('click', () => onEdge(e.key, e.plus));
    btns.appendChild(mBtn); btns.appendChild(pBtn);
    row.appendChild(lbl); row.appendChild(btns);
    grid.appendChild(row);
  });
  return grid;
}

function _mkPosDisplay(row_start, row_end, col_start, col_end) {
  const table = el('div', 'adj-pos-table');
  const kv = (k, v) => {
    const d = el('div', 'adj-pos-kv');
    const kEl = el('span', 'adj-pos-k'); kEl.textContent = k;
    const vEl = el('span', 'adj-pos-v'); vEl.textContent = v;
    d.appendChild(kEl); d.appendChild(vEl);
    return d;
  };
  const h = (row_end - row_start + 1) * 5;
  const w = (col_end - col_start + 1) * 5;
  table.appendChild(kv('上端', `${row_start * 5}cm`));
  table.appendChild(kv('縦',   `${h}cm`));
  table.appendChild(kv('左端', `${col_start * 5}cm`));
  table.appendChild(kv('横',   `${w}cm`));
  return table;
}

}

function renderCropAdjPanel(crop, bedId, dateStr) {
