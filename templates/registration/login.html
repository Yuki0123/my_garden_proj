{% extends "base.html" %}

{% block title %}ログイン — 畑管理{% endblock %}

{% block extra_css %}
<style>
  .login-wrap {
    max-width: 360px;
    margin: 60px auto;
    background: white;
    padding: 32px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  h1 { font-size: 1.3rem; margin-bottom: 24px; color: #4a7c59; }
  label { display: block; font-size: 0.85rem; margin-bottom: 4px; color: #555; }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 1rem;
    margin-bottom: 16px;
  }
  .btn { width: 100%; padding: 10px; font-size: 1rem; }
  .error { color: #c0392b; font-size: 0.85rem; margin-bottom: 12px; }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
  <h1>ログイン</h1>
  {% if form.errors %}
    <p class="error">ユーザー名またはパスワードが正しくありません。</p>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <label for="id_username">ユーザー名</label>
    <input type="text" name="username" id="id_username" autofocus>
    <label for="id_password">パスワード</label>
    <input type="password" name="password" id="id_password">
    <button type="submit" class="btn">ログイン</button>
  </form>
</div>
{% endblock %}
