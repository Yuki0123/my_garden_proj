<div id="crop-modal" uk-modal>
    <div class="uk-modal-dialog uk-modal-body">

        <button class="uk-modal-close-default" type="button" uk-close></button>

        <h3 class="uk-modal-title">野菜を選択</h3>

        <p class="uk-text-meta">植え付けたい野菜を選んでください</p>

        <div id="v-type-picker" class="uk-grid-small uk-child-width-1-3 uk-child-width-1-6@m uk-text-center" uk-grid
            style="max-height: 400px; overflow-y: auto;">
        </div>

        <form id="veg-selection-form">
            <input type="hidden" id="selected-type-id">
            <div class="uk-margin-top uk-text-right">
                <button class="uk-button uk-button-default uk-modal-close" type="button">キャンセル</button>
            </div>
        </form>
    </div>
</div>
