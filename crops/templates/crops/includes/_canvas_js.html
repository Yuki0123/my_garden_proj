<script>
    // 1. 定数を一番外側に置く（どこからでも見えるようにする）
    const CELL_SIZE = 10;
    const COLS = 70;
    const ROWS = 180;

    document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById('garden-canvas');
        if (!canvas) {
            console.error("Canvasが見つかりません！");
            return;
        }
        const ctx = canvas.getContext('2d');

        // 2. キャンバスのサイズをここで確定させる
        canvas.width = COLS * CELL_SIZE;
        canvas.height = ROWS * CELL_SIZE;
        // 2. ★重要★ CSSによる強制的な引き伸ばしを防ぐ
        // これを入れないと、親要素の幅に合わせて横にビヨーンと伸びることがあります

        const dataElement = document.getElementById('plot-data-json');
        if (!dataElement) {
            console.error("データ要素（plot-data-json）が見つかりません");
            return;
        }

        try {
            const plotData = JSON.parse(dataElement.textContent);
            // 3. 描画関数を呼び出す
            drawGarden(canvas, ctx, plotData);
        } catch (e) {
            console.error("JSONパースエラー:", e);
        }
    });

    // 描画関数：必要な情報をすべて引数で受け取る
    function drawGarden(canvas, ctx, plotData) {
        // 背景をクリア
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let r = 0; r < ROWS; r++) {
            const isAlternateSection = Math.floor(r / 30) % 2 === 0;
            for (let c = 0; c < COLS; c++) {
                const x = c * CELL_SIZE;
                const y = r * CELL_SIZE;
                const plot = plotData[`${r}-${c}`];
                // 4. 安全にデータを判定する
                // 畝なら茶色、それ以外はグレー
                if (plot && plot.is_bed) {
                    ctx.fillStyle = '#8B4513';
                } else {
                    ctx.fillStyle = isAlternateSection ? '#E0E0E0' : '#F0F0F0';
                }

                // 描画
                ctx.fillRect(x, y, CELL_SIZE - 1, CELL_SIZE - 1);

                // 作物がある場合
                if (plot && plot.crop) {
                    ctx.fillStyle = '#2ECC71';
                    ctx.fillRect(x + 4, y + 4, CELL_SIZE - 8, CELL_SIZE - 8);
                }
            }
        }
        console.log("描画が正常に完了しました");
    }
</script>
