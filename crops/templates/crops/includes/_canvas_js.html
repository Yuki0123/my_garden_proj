<script>
    document.addEventListener('DOMContentLoaded', () => {
        const wrapper = document.getElementById('canvas-wrapper');
        const canvas = document.getElementById('garden-canvas');
        if (!wrapper || !canvas) return;

        const ctx = canvas.getContext('2d');

        // ★ ROWS(行)は 180、COLS(列)は 70 です
        const ROWS = 180;
        const COLS = 70;

        // 1. 親要素の幅を取得して、1マスのサイズを計算
        const wrapperWidth = wrapper.clientWidth;
        const dynamicCellSize = wrapperWidth / COLS;

        // 2. キャンバスの解像度を設定
        canvas.width = wrapperWidth;
        canvas.height = ROWS * dynamicCellSize;

        const dataElement = document.getElementById('plot-data-json');
        if (!dataElement) return;

        try {
            const plotData = JSON.parse(dataElement.textContent);
            // 描画関数を呼び出す（dynamicCellSizeを渡す）
            drawGarden(canvas, ctx, plotData, dynamicCellSize, ROWS, COLS);
        } catch (e) {
            console.error("JSONパースエラー:", e);
        }

    });

    function drawGarden(canvas, ctx, plotData, cellSize, rows, cols) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let r = 0; r < rows; r++) {
            // 30行ごとに色を変える（Math.floor(r / 30)）
            const isAlternateSection = Math.floor(r / 30) % 2 === 0;

            for (let c = 0; c < cols; c++) {
                const x = c * cellSize;
                const y = r * cellSize;
                const plot = plotData[`${r}-${c}`];

                if (plot && plot.is_bed) {
                    ctx.fillStyle = '#8B4513';
                } else {
                    ctx.fillStyle = isAlternateSection ? '#E0E0E0' : '#F0F0F0';
                }

                // ★ CELL_SIZE ではなく cellSize (引数) を使う
                ctx.fillRect(x, y, cellSize - 1, cellSize - 1);

                if (plot && plot.crop) {
                    ctx.fillStyle = '#2ECC71';
                    // 作物もcellSizeに合わせてサイズ調整
                    const padding = cellSize * 0.2;
                    ctx.fillRect(x + padding, y + padding, cellSize - (padding * 2), cellSize - (padding * 2));
                }
            }
        }
        console.log("描画が正常に完了しました");
    }

</script>
