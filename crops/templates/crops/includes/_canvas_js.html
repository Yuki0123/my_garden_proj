<script>
    document.addEventListener('DOMContentLoaded', () => {
        console.log("GardenController: Starting initialization...");
        
        // GardenController が読み込まれていることを確認
        if (typeof GardenController !== 'undefined') {
            GardenController.init({
                areaId: '{{ garden.id }}',
                canvasId: 'garden-canvas',
                plotDataId: 'plot_data',
                vegetableTypesId: 'v_types_data',
                bedDataId: 'bed_data'
            });
        } else {
            console.error("GardenController がまだ読み込まれていません");
        }
    });
</script>
