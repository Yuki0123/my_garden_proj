<div id="editor-control-panel" style="display:none; position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:1000; width: 420px;">
    <div class="panel-content">
        <h4><span id="display-veg-name"></span> を配置中</h4>
        <button type="button" onclick="GardenEditor.savePlanting()">確定して登録</button>
        <button type="button" onclick="GardenEditor.cancelEditing()">キャンセル</button>
    </div>

    <form id="hidden-plant-form" method="post" action="">
        {% csrf_token %}
        <input type="hidden" name="modal-plot-ids" id="final-plot-ids">
        <input type="hidden" name="vegetable_type_id" id="final-veg-id">
        <input type="hidden" name="mode" value="plant">
    </form>
</div>
