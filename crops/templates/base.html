<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Garden{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.21.5/dist/css/uikit.min.css" />
    {% block extra_css %}{% endblock %}
    {% block extrahead %}{% endblock %}
</head>

<body>

    <nav class="uk-navbar-container" uk-navbar>
        <div class="uk-navbar-left">
            <a class="uk-navbar-item uk-logo" href="/">My Garden</a>
        </div>
        <div class="uk-navbar-right">
            <ul class="uk-navbar-nav uk-visible@m">
                <li><a href="/">ホーム</a></li>
                <li><a href="{% url 'admin:index' %}">管理画面</a></li>
                <li>
                    <form action="{% url 'logout' %}" method="post" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" style="background: none; border: none; cursor: pointer; 
                                padding: 0 15px; color: #666; font: inherit; 
                                line-height: 80px; /* ナビゲーションバーの高さに合わせる */
                                text-transform: none;">
                            ログアウト
                        </button>
                    </form>
                </li>
            </ul>
            <a class="uk-navbar-toggle uk-hidden@m" uk-navbar-toggle-icon uk-toggle="target: #offcanvas-menu"></a>
        </div>
    </nav>

    <div class="uk-container uk-margin-top">
        {% block content %}{% endblock %}
    </div>

    <div id="offcanvas-menu" uk-offcanvas="flip: true; overlay: true">
        <div class="uk-offcanvas-bar">
            <button class="uk-offcanvas-close" type="button" uk-close></button>
            <ul class="uk-nav uk-nav-default">
                <li class="uk-nav-header">メニュー</li>
                <li><a href="/">ホーム</a></li>
                <li><a href="{% url 'admin:index' %}">管理画面</a></li>
                <li class="uk-nav-divider"></li>
                <li>
                    <form action="{% url 'logout' %}" method="post" style="padding: 5px 20px;">
                        {% csrf_token %}
                        <button type="submit" style="background: none; border: none; cursor: pointer; 
                                color: #999; font: inherit; padding: 0;
                                text-transform: none;">
                            ログアウト
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/uikit@3.21.5/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.21.5/dist/js/uikit-icons.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
